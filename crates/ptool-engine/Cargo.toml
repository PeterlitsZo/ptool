[package]
name = "ptool-engine"
version.workspace = true
edition.workspace = true

[dependencies]
glob = "0.3.3"
md5 = "0.8.0"
owo-colors = "4.3.0"
russh = "0.58.0"
sha1 = "0.11.0"
sha2 = "0.11.0"
shlex = "1.3.0"
sqlx = { version = "0.8.6", features = ["any", "sqlite", "postgres", "mysql", "runtime-tokio-rustls"] }
tokio = { version = "1.50.0", features = ["rt-multi-thread", "time", "net"] }
url = "2.5.8"
