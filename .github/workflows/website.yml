name: Website

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/website.yml'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: website
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: ptool

jobs:
  deploy:
    name: Build and deploy website
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: website/requirements-docs-i18n.txt

      - name: Install docs i18n dependencies
        run: python -m pip install -r requirements-docs-i18n.txt
        working-directory: website

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build website
        run: npm run build
        working-directory: website

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          wrangler pages deploy website/build
          --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
          --branch=${{ github.ref_name }}
