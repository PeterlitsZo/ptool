name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            asset_name: linux-amd64
            use_zigbuild: true
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset_name: linux-arm64
            use_zigbuild: true
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: macos-arm64
            use_zigbuild: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select stable Rust toolchain
        run: |
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_zigbuild }}" = 'true' ]; then
            cargo zigbuild --locked --release --target "${{ matrix.target }}" --bin ptool
          else
            cargo build --locked --release --target "${{ matrix.target }}" --bin ptool
          fi

      - name: Package release artifact
        id: package
        run: |
          version="${GITHUB_REF_NAME}"
          archive_name="ptool-${version}-${{ matrix.asset_name }}.tar.gz"
          mkdir -p dist/stage
          cp "target/${{ matrix.target }}/release/ptool" dist/stage/ptool
          tar -C dist/stage -czf "dist/${archive_name}" ptool
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.asset_name }}
          path: dist/${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    env:
      R2_BUCKET: peterlits

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist
          merge-multiple: true

      - name: Classify release channel
        id: release_channel
        run: |
          tag="${GITHUB_REF_NAME}"
          is_prerelease=false

          case "$tag" in
            *-alpha*|*-beta*|*-rc*)
              is_prerelease=true
              ;;
          esac

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Generate stable release metadata
        if: steps.release_channel.outputs.is_prerelease != 'true'
        run: |
          printf '%s\n' "${{ steps.release_channel.outputs.tag }}" > dist/LATEST

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Upload versioned release artifacts to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for file in dist/*.tar.gz dist/SHA256SUMS; do
            name="$(basename "$file")"
            wrangler r2 object put "${R2_BUCKET}/ptool/release/${{ steps.release_channel.outputs.tag }}/${name}" --remote --file "$file"
          done

      - name: Upload stable release aliases to Cloudflare R2
        if: steps.release_channel.outputs.is_prerelease != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          version_prefix="ptool-${{ steps.release_channel.outputs.tag }}-"

          for file in dist/*.tar.gz; do
            name="$(basename "$file")"
            asset_suffix="${name#${version_prefix}}"
            latest_name="ptool-${asset_suffix}"
            wrangler r2 object put "${R2_BUCKET}/ptool/release/latest/${latest_name}" --remote --file "$file"
          done

          wrangler r2 object put "${R2_BUCKET}/ptool/release/latest/SHA256SUMS" --remote --file dist/SHA256SUMS
          wrangler r2 object put "${R2_BUCKET}/ptool/release/LATEST" --remote --file dist/LATEST

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release_channel.outputs.tag }}"
          prerelease_flag=""

          if [ "${{ steps.release_channel.outputs.is_prerelease }}" = 'true' ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "$tag" dist/*.tar.gz dist/SHA256SUMS \
              --title "$tag" \
              --generate-notes \
              $prerelease_flag
          fi
